# ================================================================
# LASER DAQ — Zephyr Kconfig
# ================================================================

# ---- CAN 总线 — 传统 CAN, 1 Mbps ----
CONFIG_CAN=y
# 启用 CAN 子系统
CONFIG_CAN_MCUX_FLEXCAN=y
# NXP MCUX FlexCAN 驱动 (flexcan0/flexcan1)
CONFIG_CAN_LOG_LEVEL_ERR=y
# CAN 驱动日志仅 ERR 级别 (屏蔽空总线 UnHandled status WRN 刷屏)

# ---- 日志 ----
CONFIG_LOG=y
# 启用 Zephyr 日志子系统 (LOG_INF/LOG_ERR 等)

# ---- 存储: Flash + FatFS (W25Q64JV NOR Flash, 8 MB) ----
CONFIG_FLASH=y
# 启用 Flash 驱动子系统
CONFIG_FLASH_MAP=y
# 启用 Flash 分区映射 (overlay 中 partition 需要)
CONFIG_FLASH_PAGE_LAYOUT=y
# 启用页布局查询
CONFIG_FILE_SYSTEM=y
# 启用 VFS 虚拟文件系统层 (统一 fs_open/fs_write 接口)
CONFIG_FAT_FILESYSTEM_ELM=y
# 启用 FatFS (FAT32, PC 兼容)
CONFIG_FS_FATFS_MOUNT_MKFS=y
# 挂载失败时自动格式化
CONFIG_FS_FATFS_LFN=y
# 支持长文件名
CONFIG_FS_FATFS_REENTRANT=y
# FatFS 可重入 (多线程安全, 嗅探定时器 + 主线程并发访问)

# ---- USB 设备栈 (HS USB, Mass Storage) ----
CONFIG_USB_DEVICE_STACK_NEXT=y
# 启用 USB Device Stack Next (新一代 USBD 栈)
CONFIG_USBD_MSC_CLASS=y
# 启用 USB Mass Storage Class 驱动
CONFIG_USBD_MSC_LUNS_PER_INSTANCE=1
# 注册 1 个逻辑单元 (对应 W25Q64JV)
CONFIG_DISK_DRIVER_FLASH=y
# 启用 Flash 磁盘驱动 (将 Flash 分区作为块设备)

# ---- 栈大小 ----
CONFIG_MAIN_STACK_SIZE=4096
# main 线程栈 4KB (FatFS 目录遍历结构较大, 默认 2KB 不够)

# ---- 浮点支持 ----
CONFIG_FPU=y
# 启用硬件 FPU (Cortex-M33 支持单精度)
CONFIG_PICOLIBC_IO_FLOAT=y
# 启用 picolibc 浮点 I/O (%f 格式化)
CONFIG_CBPRINTF_FP_SUPPORT=y
# 启用 cbprintf 浮点格式化支持
CONFIG_REQUIRES_FLOAT_PRINTF=y
# 声明需要浮点打印

# ---- 系统重启 ----
CONFIG_REBOOT=y
# 启用 sys_reboot 系统重启 (EraseFlash 后自动重启)
